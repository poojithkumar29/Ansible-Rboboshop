- name: setup fronetnd server
  hosts: frontend
  become: yes
  tasks:
    - name: Disable NGINX
      ansible.builtin.command: dnf module disable nginx -y

    - name: Enable NGINX
      ansible.builtin.command: dnf module enable nginx:1.24 -y

    - name: Delete default fike
      ansible.builtin.file:
        state: absent
        path:  /usr/share/nginx/html/*

    - name: Download the frontend content
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/frontend-v3.zip
        dest: /tmp/frontend.zip

    - name:  Extract the frontend content.
      ansible.builtin.unarchive:
        src: /tmp/frontend.zip
        dest: /usr/share/nginx/html/
        remote_src: yes

    - name: delete default nginx conf
      ansible.builtin.file:
        state: absent
        path: /etc/nginx/nginx.conf


    - name: copy the file
      ansible.builtin.copy:
        src: nginx.conf
        dest: /etc/nginx/nginx.conf
    
    - name: restart nginx
      ansible.builtin.service:
        name: nginx
        state: restarted # restarted if you have already started earlier
        enabled: yes

